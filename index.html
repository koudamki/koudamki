<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ask Me Anything</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      /* Claude's background colour */
      background: #f5f0e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    /* ── ORB ── */
    .orb-wrapper {
      position: relative;
      width: 300px;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.8rem;
    }

    /* Outer spinning ring */
    .orb-spin-ring {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 3px solid transparent;
      background:
        linear-gradient(#f5f0e8, #f5f0e8) padding-box,
        conic-gradient(
          from 0deg,
          #3355ff,
          #0011cc,
          #6688ff,
          #0033ff,
          #0011bb,
          #3355ff
        ) border-box;
      animation: spinRing 3s linear infinite;
      filter: drop-shadow(0 0 10px #2244ffaa);
    }

    /* Second inner spinning ring (opposite) */
    .orb-spin-ring2 {
      position: absolute;
      inset: 14px;
      border-radius: 50%;
      border: 2px solid transparent;
      background:
        linear-gradient(#f5f0e8, #f5f0e8) padding-box,
        conic-gradient(
          from 180deg,
          #1133ee,
          #4466ff,
          #0022dd,
          #5577ff,
          #1133ee
        ) border-box;
      animation: spinRing 2s linear infinite reverse;
      filter: drop-shadow(0 0 6px #2244ff88);
    }

    /* Glow halo */
    .orb-glow {
      position: absolute;
      inset: -30px;
      border-radius: 50%;
      background: radial-gradient(circle, #3355ff22 0%, #1133cc11 50%, transparent 75%);
      animation: glowPulse 3s ease-in-out infinite;
      pointer-events: none;
    }

    /* Core circle */
    .orb-core {
      position: relative;
      width: 210px;
      height: 210px;
      border-radius: 50%;
      background: radial-gradient(circle at 42% 38%,
        #1a1a2e 0%,
        #0d0d22 55%,
        #050518 100%
      );
      overflow: hidden;
      box-shadow:
        0 0 40px #1133ff33,
        inset 0 0 30px #0011aa22;
    }

    #orbCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border-radius: 50%;
    }

    @keyframes spinRing {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.06); }
    }

    /* Thinking state — faster spin + stronger glow */
    .orb-wrapper.thinking .orb-spin-ring  { animation-duration: 0.7s; filter: drop-shadow(0 0 18px #4466ffcc); }
    .orb-wrapper.thinking .orb-spin-ring2 { animation-duration: 0.4s; }
    .orb-wrapper.thinking .orb-glow       { animation: glowPulse 0.6s ease-in-out infinite; }

    /* ── LABEL ── */
    .label {
      color: #555;
      font-size: 0.95rem;
      letter-spacing: 0.06em;
      margin-bottom: 1.2rem;
    }

    /* ── ANSWER BOX ── */
    .answer-box {
      max-width: 540px;
      width: 90vw;
      background: rgba(255,255,255,0.65);
      border: 1px solid rgba(80,120,255,0.18);
      border-radius: 14px;
      padding: 1rem 1.25rem;
      color: #333;
      font-size: 0.92rem;
      line-height: 1.75;
      margin-bottom: 1.2rem;
      max-height: 210px;
      overflow-y: auto;
      display: none;
      backdrop-filter: blur(6px);
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
      animation: fadeIn 0.35s ease;
    }
    .answer-box.visible { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── INPUT ROW ── */
    .input-row {
      display: flex;
      align-items: center;
      width: 90vw;
      max-width: 540px;
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(80,120,255,0.2);
      border-radius: 12px;
      padding: 0.55rem 0.55rem 0.55rem 1rem;
      gap: 0.5rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
      backdrop-filter: blur(4px);
    }

    .input-row input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #222;
      font-size: 0.95rem;
      font-family: inherit;
      caret-color: #3355ff;
    }
    .input-row input::placeholder { color: #aaa; }

    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: linear-gradient(135deg, #3355ff, #1133cc);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.1s, opacity 0.2s;
      box-shadow: 0 2px 8px #3355ff44;
    }
    .send-btn:hover   { opacity: 0.88; transform: scale(1.05); }
    .send-btn:active  { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .send-btn svg { fill: #fff; width: 15px; height: 15px; }

    .answer-box::-webkit-scrollbar { width: 4px; }
    .answer-box::-webkit-scrollbar-thumb { background: #3355ff33; border-radius: 4px; }
  </style>
</head>
<body>

  <div class="orb-wrapper" id="orbWrapper">
    <div class="orb-glow"></div>
    <div class="orb-spin-ring"></div>
    <div class="orb-spin-ring2"></div>
    <div class="orb-core">
      <canvas id="orbCanvas"></canvas>
    </div>
  </div>

  <div class="label" id="label">Ask me anything</div>

  <div class="answer-box" id="answerBox"></div>

  <div class="input-row">
    <input id="userInput" type="text" placeholder="Type your question…" autocomplete="off"/>
    <button class="send-btn" id="sendBtn" title="Send">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>

  <script>
    /* ── PARTICLE CANVAS ── */
    const canvas = document.getElementById('orbCanvas');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [], isThinking = false;

    function resize() {
      W = canvas.width  = canvas.parentElement.offsetWidth;
      H = canvas.height = canvas.parentElement.offsetHeight;
    }

    function makeParticle() {
      const angle = Math.random() * Math.PI * 2;
      const r = Math.random() * (W / 2 - 12);
      return {
        x: W/2 + Math.cos(angle) * r,
        y: H/2 + Math.sin(angle) * r,
        vx: (Math.random() - 0.5) * 0.35,
        vy: (Math.random() - 0.5) * 0.35,
        size: Math.random() * 1.6 + 0.3,
        alpha: Math.random() * 0.6 + 0.2,
        twinkle: Math.random() * Math.PI * 2,
        color: Math.random() > 0.6 ? '100,160,255' : '60,100,255',
      };
    }

    function initParticles() {
      resize();
      particles = Array.from({length: 220}, makeParticle);
    }

    function drawParticles() {
      ctx.clearRect(0, 0, W, H);
      const speed = isThinking ? 4.5 : 1;
      particles.forEach(p => {
        p.twinkle += 0.035 * speed;
        const a = p.alpha * (0.45 + 0.55 * Math.sin(p.twinkle));
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${p.color},${a})`;
        ctx.fill();
        p.x += p.vx * speed;
        p.y += p.vy * speed;
        const dx = p.x - W/2, dy = p.y - H/2;
        if (Math.sqrt(dx*dx + dy*dy) > W/2 - 10) {
          p.vx *= -1; p.vy *= -1;
        }
      });
      requestAnimationFrame(drawParticles);
    }

    initParticles();
    drawParticles();

    /* ── API ── */
    const orbWrapper = document.getElementById('orbWrapper');
    const label      = document.getElementById('label');
    const answerBox  = document.getElementById('answerBox');
    const input      = document.getElementById('userInput');
    const sendBtn    = document.getElementById('sendBtn');

    async function ask(question) {
      isThinking = true;
      orbWrapper.classList.add('thinking');
      label.textContent = 'Thinking…';
      answerBox.classList.remove('visible');
      answerBox.textContent = '';
      sendBtn.disabled = true;

      try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            messages: [{ role: 'user', content: question }]
          })
        });
        const data = await res.json();
        const reply = data.content?.map(b => b.text || '').join('') || 'No response.';
        answerBox.textContent = reply;
        answerBox.classList.add('visible');
        label.textContent = 'Ask me anything';
      } catch (e) {
        answerBox.textContent = 'Something went wrong. Please try again.';
        answerBox.classList.add('visible');
        label.textContent = 'Ask me anything';
      } finally {
        isThinking = false;
        orbWrapper.classList.remove('thinking');
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener('click', () => {
      const q = input.value.trim();
      if (!q) return;
      input.value = '';
      ask(q);
    });

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') sendBtn.click();
    });
  </script>
</body>
</html>
